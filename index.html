<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANGSATU - Live Bola & Skor</title>
    <style>
        /* STYLE UTAMA */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0f19; color: #fff; padding-bottom: 50px; }
        
        header { background-color: #111827; padding: 20px; text-align: center; border-bottom: 2px solid #38bdf8; }
        header h1 { color: #38bdf8; text-transform: uppercase; letter-spacing: 1px; }

        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }

        .match-title { font-size: 20px; margin-bottom: 15px; color: #fff; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        
        /* PLAYER VIDEO */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background-color: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* TOMBOL SERVER */
        .server-container { margin-top: 15px; display: flex; gap: 10px; justify-content: center; }
        .server-btn {
            background-color: #1f2937; color: #9ca3af; padding: 10px 20px; border-radius: 6px;
            border: 1px solid #374151; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .server-btn.active { background-color: #38bdf8; color: #0b0f19; border-color: #38bdf8; }
        .server-btn:hover:not(.active) { background-color: #374151; color: #fff; }

        /* SECTION LIVE SCORE & JADWAL AUTOMATIS */
        .score-section { margin-top: 40px; background-color: #111827; padding: 15px; border-radius: 10px; border: 1px solid #1f2937; }
        .score-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #38bdf8; border-left: 4px solid #38bdf8; padding-left: 10px; }
        
        .score-wrapper {
            width: 100%;
            height: 600px;
            border-radius: 8px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <header>
        <h1>MANGSATU</h1>
    </header>

    <main class="container">
        <div class="match-title">🔴 LIVE STREAMING: Server Utama</div>
        
        <div class="video-wrapper">
            <iframe id="main-player" src="https://www.youtube.com/embed/live_stream?channel=UCqBRNKY3-X9T6HwB0n6Z_jA" allowfullscreen></iframe>
        </div>

        <div class="server-container">
            <button class="server-btn active" onclick="gantiServer('https://www.youtube.com/embed/live_stream?channel=UCqBRNKY3-X9T6HwB0n6Z_jA', this)">Server 1</button>
            <button class="server-btn" onclick="gantiServer('https://www.youtube.com/embed/dQw4w9WgXcQ', this)">Server 2 (Cadangan)</button>
        </div>

        <section class="score-section">
            <div class="score-title">Live Score & Jadwal Pertandingan Hari Ini</div>
            <div class="score-wrapper">
                <iframe src="https://www.livescore.im/" width="100%" height="100%" frameborder="0" allowtransparency="true"></iframe>
            </div>
        </section>
    </main>

    <script>
        // Fungsi ganti server video
        function gantiServer(url, btn) {
            document.getElementById('main-player').src = url;
            document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
