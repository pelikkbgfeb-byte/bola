<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANGSATU - Live Bola & Jadwal</title>
    <style>
        /* STYLE UTAMA */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0f19; color: #fff; padding-bottom: 50px; }
        
        header { background-color: #111827; padding: 20px; text-align: center; border-bottom: 2px solid #38bdf8; }
        header h1 { color: #38bdf8; text-transform: uppercase; letter-spacing: 1px; }

        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }

        .match-title { font-size: 20px; margin-bottom: 15px; color: #fff; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        
        /* PLAYER VIDEO */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background-color: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* TOMBOL SERVER */
        .server-container { margin-top: 15px; display: flex; gap: 10px; justify-content: center; }
        .server-btn {
            background-color: #1f2937; color: #9ca3af; padding: 10px 20px; border-radius: 6px;
            border: 1px solid #374151; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .server-btn.active { background-color: #38bdf8; color: #0b0f19; border-color: #38bdf8; }
        .server-btn:hover:not(.active) { background-color: #374151; color: #fff; }

        /* SECTION JADWAL PERTANDINGAN */
        .jadwal-section { margin-top: 40px; background-color: #111827; padding: 20px; border-radius: 10px; border: 1px solid #1f2937; }
        .jadwal-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #38bdf8; border-left: 4px solid #38bdf8; padding-left: 10px; }
        
        /* TABEL RESPONSIF */
        .tabel-scroll { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 500px; }
        th { background-color: #1f2937; color: #9ca3af; padding: 12px; font-size: 14px; text-transform: uppercase; }
        td { padding: 15px 12px; border-bottom: 1px solid #1f2937; font-size: 15px; vertical-align: middle; }
        tr:hover { background-color: #151f32; }

        /* BADGE STATUS */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .badge-live { background-color: #ef4444; color: #fff; animation: blink 1.5s infinite; }
        .badge-nanti { background-color: #374151; color: #9ca3af; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <h1>MANGSATU</h1>
    </header>

    <main class="container">
        <!-- AREA STREAMING -->
        <div class="match-title" id="current-match">🔴 SEDANG BERLANGSUNG: Live Match Streaming</div>
        
        <div class="video-wrapper">
            <!-- Link Embed Live Terbaru -->
            <iframe id="main-player" src="https://www.youtube.com/embed/a8RWX5CRrI0" allowfullscreen></iframe>
        </div>

        <!-- TOMBOL PILIHAN SERVER -->
        <div class="server-container">
            <button class="server-btn active" onclick="gantiServer('https://www.youtube.com/embed/a8RWX5CRrI0', '🔴 SEDANG BERLANGSUNG: Live Match Streaming', this)">Server 1</button>
            <button class="server-btn" onclick="gantiServer('https://www.youtube.com/embed/dQw4w9WgXcQ', '🔴 STREAM CADANGAN: Rick Astley Show', this)">Server 2 (Backup)</button>
        </div>

        <!-- AREA JADWAL BOLA LOKAL -->
        <section class="jadwal-section">
            <div class="jadwal-title">Jadwal Pertandingan Hari Ini</div>
            
            <div class="tabel-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Jam</th>
                            <th>Liga</th>
                            <th>Pertandingan</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>20:30 WITA</td>
                            <td style="color: #38bdf8;">Live Match</td>
                            <td><strong>Pertandingan</strong> Pilihan Hari Ini</td>
                            <td><span class="badge badge-live">LIVE</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        function gantiServer(url, title, btn) {
            document.getElementById('main-player').src = url;
            document.getElementById('current-match').innerText = title;
            document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
